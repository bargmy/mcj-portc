name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 wget unzip

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3
        id: setup_android

      - name: Install NDK and Build Tools
        run: |
          sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"

      - name: Prepare Windows Dependencies
        run: |
          # Download GLFW
          wget -q https://github.com/glfw/glfw/releases/download/3.3.10/glfw-3.3.10.bin.WIN64.zip
          unzip -q glfw-3.3.10.bin.WIN64.zip
          
          # Build zlib
          cd zlib-1.3.1
          make -f win32/Makefile.gcc clean
          make -f win32/Makefile.gcc PREFIX=x86_64-w64-mingw32- libz.a

      - name: Build Windows EXE
        run: |
          CC=x86_64-w64-mingw32-gcc
          CFLAGS="-Wall -Wextra -O3 -I. -Iglfw-3.3.10.bin.WIN64/include -Izlib-1.3.1"
          LDFLAGS="-Lglfw-3.3.10.bin.WIN64/lib-mingw-w64 -Lzlib-1.3.1"
          LIBS="-lglfw3 -lopengl32 -lglu32 -lz -lgdi32 -lwinmm -mwindows"
          SRC="vec3.c aabb.c tesselator.c textures.c tile.c level.c frustum.c chunk.c level_renderer.c entity.c player.c character.c timer.c input.c font.c mobile_ui.c rubydung.c"
          $CC $CFLAGS $SRC -o rubydung.exe $LDFLAGS $LIBS

      - name: Build Android APK
        run: |
          cd android
          echo "ndk.dir=${{ steps.setup_android.outputs.sdk-path }}/ndk/26.1.10909125" > local.properties
          echo "sdk.dir=${{ steps.setup_android.outputs.sdk-path }}" >> local.properties
          chmod +x gradlew || true
          # Use the installed gradle since gradlew might not be in the repo yet
          gradle assembleRelease || ./gradlew assembleRelease
        env:
          ANDROID_HOME: ${{ steps.setup_android.outputs.sdk-path }}

      - name: Sign Android APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          ANDROID_HOME: ${{ steps.setup_android.outputs.sdk-path }}

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-${{ steps.date.outputs.date }}
          name: Release ${{ steps.date.outputs.date }}
          body: |
            Automated build for RubyDung C Port.
            - Windows x64 (Cross-compiled on Linux)
            - Android APK (Signed, API 21+)
          files: |
            rubydung.exe
            ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
