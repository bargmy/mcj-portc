name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          vcpkg install glfw3:x64-windows zlib:x64-windows
          
      - name: Configure CMake
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        
      - name: Build
        run: cmake --build build --config Release
        
      - name: Rename Artifact
        run: move build\Release\rubydung.exe rubydung-windows-x64.exe
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rubydung-windows
          path: rubydung-windows-x64.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nndixon/android-ndk-action@v1
        with:
          ndk-version: r26b

      - name: Build for Android (arm64-v8a)
        run: |
          mkdir build-arm64
          cd build-arm64
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                   -DANDROID_ABI=arm64-v8a \
                   -DANDROID_PLATFORM=android-21 \
                   -DANDROID_PORT=ON
          make
          cp librubydung-android.so ../librubydung-android-arm64.so

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rubydung-android
          path: librubydung-android-arm64.so

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: rubydung-windows
          
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: rubydung-android
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-${{ steps.date.outputs.date }}
          name: Release ${{ steps.date.outputs.date }}
          body: |
            Automated build for RubyDung C Port.
            Targeting Windows x64 and Android (API 21+).
          files: |
            rubydung-windows-x64.exe
            librubydung-android-arm64.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
